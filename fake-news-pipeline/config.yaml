data:
  raw_path: "data/raw/FakeNewsNetCleaned.csv"
  processed_path: "data/processed/cleaned.csv"

model:
  name: "logistic_regression"
  save_path: "models/model.pkl"
  tfidf_max_features: 5000
  tfidf_stop_words: "english"
  test_size: 0.2
  random_state: 42

api:
  host: "0.0.0.0"
  port: 8000

reports:
  dir: "reports"
  confusion_matrix: "reports/confusion_matrix.png"
  classification_report: "reports/classification_report.json"
  metrics: "reports/metrics.json"
